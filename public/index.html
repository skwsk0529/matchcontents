<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeQL Advice Bot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">TimeQL Advice Bot</p>
        <h1>APIの返却事実だけで、次の一歩を返す。</h1>
        <p class="lead">
          生年月日8桁と出生時刻を入力すると、TimeQL の `natal_chart` と `transits`
          を参照して、直近の行動アドバイスを返します。
        </p>
      </section>

      <section class="panel input-panel">
        <form id="advice-form">
          <label>
            生年月日
            <input name="birthDate" type="text" inputmode="numeric" placeholder="19940529" maxlength="8" required />
          </label>

          <label>
            出生時刻
            <input name="birthTime" type="text" inputmode="numeric" placeholder="07:46" maxlength="5" required />
          </label>

          <label>
            出生地
            <input name="location" type="text" value="Tokyo" />
          </label>

          <label>
            名前
            <input name="name" type="text" value="User" />
          </label>

          <button type="submit">アドバイスを取得</button>
        </form>
        <p class="note">
          注: TimeQL の主要エンドポイントは出生地を使うため、12桁だけでは不十分です。最小版では `Tokyo` を初期値にしています。
        </p>
      </section>

      <section class="panel chat-panel">
        <div id="messages" class="messages">
          <article class="message bot">
            <p>入力を待っています。返答は TimeQL API の取得結果のみをもとに組み立てます。</p>
          </article>
        </div>
      </section>
    </main>

    <template id="message-template">
      <article class="message">
        <p class="message-role"></p>
        <div class="message-body"></div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
  </html>
