services:
  - type: web
    name: read-life
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: TIMEQL_API_KEY
        sync: false
